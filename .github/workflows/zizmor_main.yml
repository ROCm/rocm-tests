#
# Post-merge zizmor scan: runs after every push to main (typically the
# squash/rebase/merge of a PR) and pushes SARIF findings to the
# repository's code-scanning Security tab. Complements the PR-only
# zizmor job in `ci.yml`, which scans only changed workflow/action
# files and uploads a plain-text artifact for in-review browsing.
name: Zizmor_main

on:
  push:
    branches: [main]
  # Allow re-running the post-merge scan on demand, e.g. after tweaking
  # `zizmor.yml` or rotating the zizmor version pin, so the Security
  # tab can be refreshed without an unrelated commit.
  workflow_dispatch:

jobs:
  zizmor:
    uses: ./.github/workflows/zizmor.yml
    with:
      scan_mode: all
      report_formats: sarif
    permissions:
      contents: read
      # Required so the reusable workflow can call
      # github/codeql-action/upload-sarif and have the findings
      # appear under Security -> Code scanning, filterable by
      # `Tool: zizmor` separately from any other scanner.
      security-events: write
    secrets:
      # Pass the quartz-hauly GitHub App credentials so zizmor's
      # online audits run with the App's richer rate limits and
      # permissions. Same App used by `receive_therock_data.yml` /
      # `ingest.yml`.
      gh_app_id: ${{ secrets.GH_APP_HAULY_ID }}
      gh_app_private_key: ${{ secrets.GH_APP_HAULY_PRIVATE_KEY }}
