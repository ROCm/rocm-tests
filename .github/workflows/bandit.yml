name: Bandit

on:
  workflow_call:
    inputs:
      scan_mode:
        description: >-
          'changed' (default) scans only Python files modified by the
          calling event (PR commits or push range). 'all' scans every
          .py file under 'scan_path' recursively.
        required: false
        type: string
        default: changed
      report_formats:
        description: >-
          Comma-separated list of bandit report formats to produce.
          Allowed values: 'sarif' (default), 'json', 'csv', 'html',
          'xml', 'yaml', 'txt'. SARIF outputs are uploaded to GitHub
          code scanning via github/codeql-action/upload-sarif; all
          other formats are uploaded as build artifacts via
          actions/upload-artifact. Example: 'sarif,json'.
        required: false
        type: string
        default: sarif
      scan_path:
        description: >-
          Path (relative to the repository root) to scan. Defaults to
          '.' so the entire checkout is scanned; set to a subdirectory
          (e.g. 'src/' or 'services/api/') to restrict the scan to
          that subtree. The 'changed' scan mode further restricts to
          only the .py files modified inside this path. The path MUST
          exist after checkout or the scan job fails.
        required: false
        type: string
        default: "."
      severity_threshold:
        description: >-
          Minimum bandit severity that fails the job. Bandit always
          scans at LOW so the uploaded reports keep every finding;
          after the scan the script tallies findings by severity and
          fails the job only if any are at or above this threshold.
          Bandit categorises findings as LOW / MEDIUM / HIGH.
          Allowed values: 'low' (fail on any
          finding), 'medium', 'high' (default).
        required: false
        type: string
        default: high

# Reusable workflows declare the *minimum* permissions every caller
# must grant. We intentionally do NOT request `security-events: write`
# here even though the SARIF upload step needs it: declaring it at the
# workflow level would force every PR caller (which typically only
# asks for HTML/JSON artifacts) to grant it too, otherwise GitHub
# rejects the call with `requesting 'security-events: write', but is
# only allowed 'security-events: none'`. Instead, callers that
# actually upload SARIF (e.g. `bandit_main.yml`) grant
# `security-events: write` on their own `uses:` job, and the
# upload-sarif step uses it transparently. PR callers that don't need
# SARIF stay on the repo's restrictive default.
permissions:
  contents: read

jobs:
  scan:
    name: Bandit scan
    runs-on: ubuntu-24.04
    steps:
      - name: Bootstrap checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Compute checkout fetch-depth
        id: depth
        uses: ./.github/actions/compute_pr_fetch_depth

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ steps.depth.outputs.value }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run bandit
        id: scan
        env:
          BANDIT_SCAN_MODE: ${{ inputs.scan_mode }}
          BANDIT_REPORT_FORMATS: ${{ inputs.report_formats }}
          BANDIT_SOURCE_DIR: ${{ inputs.scan_path }}
          BANDIT_SEVERITY_THRESHOLD: ${{ inputs.severity_threshold }}
        run: python scan_tools/github_actions/bandit.py

      - name: Upload SARIF report to code scanning
        if: always() && steps.scan.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif_path }}
          category: bandit

      - name: Upload non-SARIF reports
        if: always() && steps.scan.outputs.non_sarif_paths != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-report
          path: ${{ steps.scan.outputs.non_sarif_paths }}
          if-no-files-found: ignore
