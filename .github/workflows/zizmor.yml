name: Zizmor

on:
  workflow_call:
    inputs:
      scan_mode:
        description: >-
          'changed' (default) audits only workflow / composite-action /
          dependabot files modified by the calling event (PR commits or
          push range). 'all' audits every such file under 'scan_path'
          recursively.
        required: false
        type: string
        default: changed
      report_formats:
        description: >-
          Comma-separated list of zizmor report formats to produce.
          Allowed values: 'sarif' (default), 'json', 'plain', 'github'.
          SARIF outputs are uploaded to GitHub code scanning via
          github/codeql-action/upload-sarif; all other formats are
          uploaded as build artifacts via actions/upload-artifact.
          Example: 'sarif,plain'.
        required: false
        type: string
        default: sarif
      scan_path:
        description: >-
          Path (relative to the repository root) to audit. Defaults to
          '.' so the entire checkout is audited; set to a subdirectory
          (e.g. '.github/workflows/' or 'services/api/') to restrict
          the audit to that subtree. The 'changed' scan mode further
          restricts to only the workflow / action / dependabot files
          modified inside this path. The path MUST exist after
          checkout or the scan job fails.
        required: false
        type: string
        default: "."
      severity_threshold:
        description: >-
          Minimum zizmor severity that fails the job. Zizmor reports
          every finding regardless of threshold so the uploaded
          reports keep the full picture; after the scan the script
          tallies findings by severity and fails the job only if any
          are at or above this threshold. Zizmor categorises findings
          as INFORMATIONAL / LOW / MEDIUM / HIGH. Allowed values:
          'informational' (fail on any finding), 'low', 'medium',
          'high' (default).
        required: false
        type: string
        default: high
      persona:
        description: >-
          Zizmor audit persona. 'regular' (default) surfaces
          high-signal, actionable findings. 'pedantic' adds code
          smells suitable for cleanup PRs. 'auditor' surfaces
          everything zizmor knows about, including likely false
          positives -- intended for security reviews, not CI.
        required: false
        type: string
        default: regular
    secrets:
      gh_app_id:
        description: >-
          GitHub App ID used to mint an installation access token for
          zizmor's online audits (e.g. the 'unpinned-uses' audit
          resolves action SHAs against the GitHub API). Optional:
          when both 'gh_app_id' and 'gh_app_private_key' are passed
          the reusable workflow generates a short-lived App token
          and exports it as 'GH_TOKEN' to zizmor; otherwise it falls
          back to the calling workflow's default GITHUB_TOKEN, which
          has only the permissions granted to this reusable workflow
          (minimum: contents: read). Fork PRs that can't read the
          base repo's secrets land on the fallback automatically.
        required: false
      gh_app_private_key:
        description: >-
          PEM-encoded private key paired with 'gh_app_id'. See
          'gh_app_id' for usage details.
        required: false

# Reusable workflows declare the *minimum* permissions every caller
# must grant. We intentionally do NOT request `security-events: write`
# here even though the SARIF upload step needs it: declaring it at the
# workflow level would force every PR caller (which typically only
# asks for plain/JSON artifacts) to grant it too, otherwise GitHub
# rejects the call with `requesting 'security-events: write', but is
# only allowed 'security-events: none'`. Instead, callers that
# actually upload SARIF (e.g. `zizmor_main.yml`) grant
# `security-events: write` on their own `uses:` job, and the
# upload-sarif step uses it transparently. PR callers that don't need
# SARIF stay on the repo's restrictive default.
permissions:
  contents: read

jobs:
  scan:
    name: Zizmor scan
    runs-on: ubuntu-24.04
    env:
      GH_APP_ID: ${{ secrets.gh_app_id }}
      GH_APP_PRIVATE_KEY: ${{ secrets.gh_app_private_key }}
    steps:
      - name: Bootstrap checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Compute checkout fetch-depth
        id: depth
        uses: ./.github/actions/compute_pr_fetch_depth

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ steps.depth.outputs.value }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Generate GitHub App token
        id: app-token
        if: env.GH_APP_ID != '' && env.GH_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@2e564a0bb8e7cc2b907b2401a2afe177882d4325 # v3.0.0
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Run zizmor
        id: scan
        env:
          ZIZMOR_SCAN_MODE: ${{ inputs.scan_mode }}
          ZIZMOR_REPORT_FORMATS: ${{ inputs.report_formats }}
          ZIZMOR_SOURCE_DIR: ${{ inputs.scan_path }}
          ZIZMOR_SEVERITY_THRESHOLD: ${{ inputs.severity_threshold }}
          ZIZMOR_PERSONA: ${{ inputs.persona }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: python scan_tools/github_actions/zizmor.py

      - name: Upload SARIF report to code scanning
        if: always() && steps.scan.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif_path }}
          category: zizmor

      - name: Upload non-SARIF reports
        if: always() && steps.scan.outputs.non_sarif_paths != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zizmor-report
          path: ${{ steps.scan.outputs.non_sarif_paths }}
          if-no-files-found: ignore
