name: Trivy

on:
  workflow_call:
    inputs:
      scan_mode:
        description: >-
          'changed' (default) short-circuits with a no-op when no
          dependency-manifest / IaC / container file is modified by
          the calling event (PR commits or push range), and otherwise
          scans the entire 'scan_path'. Trivy's filesystem scanner
          needs the whole subtree to resolve transitive deps and
          cross-file IaC references, so unlike bandit/zizmor we don't
          try to feed individual changed files. 'all' always scans
          'scan_path' recursively.
        required: false
        type: string
        default: changed
      report_formats:
        description: >-
          Comma-separated list of trivy report formats to produce.
          Allowed values: 'sarif' (default), 'json', 'table',
          'cyclonedx', 'spdx-json', 'github'. SARIF outputs are
          uploaded to GitHub code scanning via
          github/codeql-action/upload-sarif; all other formats are
          uploaded as build artifacts via actions/upload-artifact.
          Example: 'sarif,table'.
        required: false
        type: string
        default: sarif
      scanners:
        description: >-
          Comma-separated list of trivy scanners to enable. Allowed
          values: 'vuln', 'misconfig', 'secret', 'license'. Default
          'misconfig,vuln' intentionally omits the 'secret' scanner
          because gitleaks already covers secret detection in this
          repository (see '.github/workflows/gitleaks.yml'); enable
          it here explicitly only if you want both scanners running
          side by side.
        required: false
        type: string
        default: misconfig,vuln
      scan_path:
        description: >-
          Path (relative to the repository root) to scan. Defaults to
          '.' so the entire checkout is scanned; set to a subdirectory
          (e.g. 'services/api/') to restrict the scan to that subtree.
          The 'changed' scan mode further restricts to "did any
          audited file change inside this path?" The path MUST exist
          after checkout or the scan job fails.
        required: false
        type: string
        default: "."
      severity_threshold:
        description: >-
          Minimum trivy severity that fails the job. Trivy reports
          every finding regardless of threshold so the uploaded
          reports keep the full picture; after the scan the script
          tallies findings by severity and fails the job only if any
          are at or above this threshold. Trivy categorises findings
          as LOW / MEDIUM / HIGH / CRITICAL. Allowed values: 'low'
          (fail on any finding), 'medium', 'high' (default),
          'critical'.
        required: false
        type: string
        default: high

# Reusable workflows declare the *minimum* permissions every caller
# must grant. We intentionally do NOT request `security-events: write`
# here even though the SARIF upload step needs it: declaring it at the
# workflow level would force every PR caller (which typically only
# asks for table/JSON artifacts) to grant it too, otherwise GitHub
# rejects the call with `requesting 'security-events: write', but is
# only allowed 'security-events: none'`. Instead, callers that
# actually upload SARIF (e.g. `trivy_main.yml`) grant
# `security-events: write` on their own `uses:` job, and the
# upload-sarif step uses it transparently. PR callers that don't need
# SARIF stay on the repo's restrictive default.
permissions:
  contents: read

jobs:
  scan:
    name: Trivy scan
    runs-on: ubuntu-24.04
    steps:
      - name: Bootstrap checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Compute checkout fetch-depth
        id: depth
        uses: ./.github/actions/compute_pr_fetch_depth

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ steps.depth.outputs.value }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run trivy
        id: scan
        env:
          TRIVY_SCAN_MODE: ${{ inputs.scan_mode }}
          TRIVY_REPORT_FORMATS: ${{ inputs.report_formats }}
          TRIVY_SCANNERS: ${{ inputs.scanners }}
          TRIVY_SOURCE_DIR: ${{ inputs.scan_path }}
          TRIVY_SEVERITY_THRESHOLD: ${{ inputs.severity_threshold }}
        run: python scan_tools/github_actions/trivy.py

      - name: Upload SARIF report to code scanning
        if: always() && steps.scan.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif_path }}
          category: trivy

      - name: Upload non-SARIF reports
        if: always() && steps.scan.outputs.non_sarif_paths != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report
          path: ${{ steps.scan.outputs.non_sarif_paths }}
          if-no-files-found: ignore
