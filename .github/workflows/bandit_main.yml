#
# Post-merge bandit scan: runs after every push to main (typically the
# squash/rebase/merge of a PR) and pushes SARIF findings to the
# repository's code-scanning Security tab. Complements the PR-only
# bandit job in `ci.yml`, which scans only changed Python files and
# uploads an HTML artifact for in-review browsing.
name: Bandit_main

on:
  push:
    branches: [main]
  # Allow re-running the post-merge scan on demand, e.g. after tweaking
  # `bandit.yaml` or rotating the bandit version pin, so the Security
  # tab can be refreshed without an unrelated commit.
  workflow_dispatch:

jobs:
  bandit:
    uses: ./.github/workflows/bandit.yml
    with:
      scan_mode: all
      report_formats: sarif
    permissions:
      contents: read
      # Required so the reusable workflow can call
      # github/codeql-action/upload-sarif and have the findings
      # appear under Security -> Code scanning, filterable by
      # `Tool: Bandit` separately from any other scanner.
      security-events: write
